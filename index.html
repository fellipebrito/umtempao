<style>
  html { height: 100%; }
  body { min-height: 100%; margin: 0; padding: 0; background: #0C0820; color: #F3EEFF; font-family: var(--ttt-font-ui); }
  .hub { max-width: 720px; margin: 0 auto; padding: 56px 24px 80px; }
  .brand { font: 700 44px/1.05 var(--ttt-font-display); color: #F3EEFF; letter-spacing: -0.01em; }
  .brand .dots { color: #7E72B8; }
  .tagline { margin-top: 14px; font: 400 17px/1.45 var(--ttt-font-ui); color: #B4A9E0; max-width: 560px; }
  .grid { margin-top: 44px; display: flex; flex-direction: column; gap: 14px; }
  .card { display: block; padding: 22px 24px; background: #14102B; border: 2px solid #2A2257; box-shadow: 4px 4px 0 rgba(0,0,0,0.45); text-decoration: none; transition: border-color 0.15s, transform 0.15s; }
  .card:hover { border-color: #34E6D9; transform: translate(-1px, -1px); }
  .card .name { font: 700 24px/1.2 var(--ttt-font-display); color: #34E6D9; letter-spacing: -0.005em; }
  .card .desc { margin-top: 8px; font: 400 14px/1.45 var(--ttt-font-ui); color: #B4A9E0; }
  .card .count { margin-top: 10px; font: 700 11px var(--ttt-font-ui); letter-spacing: 0.14em; text-transform: uppercase; color: #7E72B8; }
  .credit { margin-top: 64px; font: 700 11px var(--ttt-font-ui); letter-spacing: 0.14em; text-transform: uppercase; color: #7E72B8; }
  .credit a { color: inherit; text-decoration: none; }
</style>
</head>
<body>

<div class="hub">
  <h1 class="brand">um tempão<span class="dots">…</span></h1>
  <p class="tagline">Painéis que medem o tempo no esporte. Escolha uma competição.</p>
  <div id="grid" class="grid"></div>
  <div class="credit">
    <a href="https://fellipebrito.com" target="_blank" rel="noopener">Feito por Fellipe Brito · fellipebrito.com</a>
  </div>
</div>

<script src="/competitions.js"></script>
<script>
  (function () {
    var grid = document.getElementById("grid");
    window.COMPETITIONS.forEach(function (c) {
      var n = c.boards.length;
      var a = document.createElement("a");
      a.className = "card";
      a.href = "/" + c.slug + "/";
      a.innerHTML = '<div class="name">' + c.name + '</div>' +
                    '<div class="desc">' + c.tagline + '</div>' +
                    '<div class="count">' + n + (n === 1 ? ' painel' : ' painéis') + '</div>';
      grid.appendChild(a);
    });
  })();
</script>

</body>
</html>
