<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<title>Clube dos 19 — share card (1200×630)</title>
<link rel="stylesheet" href="/colors_and_type.css">
<link rel="stylesheet" href="/tokens-soccer.css">
<style>
  html, body { margin: 0; padding: 0; background: #0C0820; }
  svg { image-rendering: pixelated; }
  .sx-number { image-rendering: auto; }
  /* fixed 1200×630 stage for baking */
  #root { width: 1200px; height: 630px; overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="/proposals/clube-dos-19/data.js"></script>
<script type="text/babel" src="/proposals/clube-dos-19/shared.jsx"></script>
<script type="text/babel">
const { Scanlines, Cap, Wordmark, PlayerAvatar, BigNumber } = window.UI;
const { PLAYERS } = window.C19;

function ShareCard() {
  return (
    <div style={{ position: "relative", width: 1200, height: 630, boxSizing: "border-box", background: "var(--sx-crt-800)",
      overflow: "hidden", fontFamily: "var(--ttt-font-ui)", color: "var(--sx-ink)",
      borderTop: "6px solid var(--sx-cyan)" }}>
      {/* faint pitch stripes wash */}
      <div style={{ position: "absolute", inset: 0, opacity: 0.05,
        background: "repeating-linear-gradient(90deg, transparent 0 70px, var(--sx-chalk) 70px 72px)" }} />
      <Scanlines opacity={0.22} />
      <div style={{ position: "relative", height: "100%", display: "flex", flexDirection: "column", padding: "30px 56px 64px" }}>
        {/* header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <Wordmark />
          <span style={{ font: "var(--ttt-t-micro)", letterSpacing: "0.14em", color: "var(--sx-crt-900)",
            background: "var(--sx-magenta)", padding: "6px 12px", border: "2px solid var(--sx-crt-900)",
            boxShadow: "var(--sx-num-shadow-sm)" }}>5 LENDAS · 1 DEBATE</span>
        </div>
        {/* headline */}
        <div style={{ marginTop: 16, font: "700 50px var(--ttt-font-display)", letterSpacing: "-0.01em", lineHeight: 1.02 }}>
          Quem é o maior <span style={{ color: "var(--sx-cyan)" }}>artilheiro</span> da Copa?
        </div>
        {/* players */}
        <div style={{ flex: 1, display: "grid", gridTemplateColumns: "repeat(5,1fr)", gap: 14, alignItems: "center" }}>
          {PLAYERS.map((p) => (
            <div key={p.id} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
              <PlayerAvatar id={p.id} size={106} />
              <div style={{ font: "700 21px var(--ttt-font-display)", color: "var(--sx-ink)" }}>{p.name}</div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                <BigNumber value={p.goals} size={46} color={p.accent} shadow="var(--sx-num-shadow-sm)" />
                <Cap color="var(--sx-ink-faint)" style={{ fontSize: 11 }}>GOLS</Cap>
              </div>
            </div>
          ))}
        </div>
      </div>
      {/* footer credit — anchored to the bottom edge */}
      <div style={{ position: "absolute", left: 0, right: 0, bottom: 16, textAlign: "center" }}>
        <Cap color="var(--sx-ink-faint)" style={{ fontSize: 12 }}>DADOS &amp; PESQUISA · MARCEL PILATI · CLUBE DOS 19</Cap>
        <div style={{ marginTop: 6 }}>
          <Cap color="var(--sx-ink-dim)" style={{ fontSize: 13 }}>BUILT BY FELLIPE BRITO · FELLIPEBRITO.COM</Cap>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ShareCard />);
</script>
</body>
</html>
