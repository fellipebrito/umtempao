<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Clube dos 19 — Proposta 1 · Ranking</title>
<link rel="stylesheet" href="/colors_and_type.css">
<link rel="stylesheet" href="/tokens-soccer.css">
<style>
  html { height: 100%; }
  body, #root { min-height: 100%; margin: 0; padding: 0; background: #0C0820; }
  svg { image-rendering: pixelated; }
  .sx-number, img { image-rendering: auto; }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<script src="/proposals/clube-dos-19/data.js"></script>
<script type="text/babel" src="/proposals/clube-dos-19/shared.jsx"></script>
<script type="text/babel">
const { Scanlines, Cap, Wordmark, PlayerAvatar, BigNumber, Credit, ProposalNav } = window.UI;
const { PLAYERS, METRICS, GROUPS, STR, t, metricLabel, groupLabel, rankFor, fmtVal } = window.C19;

function MetricPicker({ metricKey, setKey }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      {GROUPS.map((g) => (
        <div key={g} style={{ display: "flex", flexWrap: "wrap", gap: 6, alignItems: "center" }}>
          <Cap color="var(--sx-ink-faint)" style={{ fontSize: 9, width: 82, flexShrink: 0 }}>{groupLabel(g)}</Cap>
          {METRICS.filter((m) => m.group === g).map((m) => {
            const on = m.key === metricKey;
            return (
              <button key={m.key} onClick={() => setKey(m.key)} style={{
                font: "var(--ttt-t-micro)", letterSpacing: "0.06em", cursor: "pointer", padding: "5px 9px",
                color: on ? "var(--sx-crt-900)" : "var(--sx-ink-dim)",
                background: on ? "var(--sx-yellow)" : "transparent",
                border: `2px solid ${on ? "var(--sx-yellow)" : "var(--sx-crt-600)"}` }}>{metricLabel(m)}</button>
            );
          })}
        </div>
      ))}
    </div>
  );
}

function Row({ entry, rank, metric, max }) {
  const { p, v } = entry;
  const lead = rank === 1;
  const pct = max > 0 ? Math.max(6, (v / max) * 100) : 6;
  return (
    <div style={{ position: "relative", display: "grid", gridTemplateColumns: "44px 56px 1fr auto",
      alignItems: "center", gap: 14, padding: "12px 16px",
      background: lead ? "var(--sx-crt-700)" : (rank % 2 ? "var(--sx-crt-800)" : "var(--sx-crt-900)"),
      borderLeft: `5px solid ${lead ? p.accent : "var(--sx-crt-600)"}`,
      boxShadow: lead ? "var(--sx-num-shadow-sm)" : "none" }}>
      <span style={{ font: "700 26px var(--ttt-font-display)", color: lead ? p.accent : "var(--sx-ink-faint)", textAlign: "center" }}>{rank}</span>
      <PlayerAvatar id={p.id} size={48} />
      <div style={{ minWidth: 0 }}>
        <div style={{ font: "var(--ttt-t-regular-b)", color: "var(--sx-ink)" }}>{p.name}</div>
        <div style={{ marginTop: 6, height: 8, background: "var(--sx-crt-900)", border: "1px solid var(--sx-crt-600)" }}>
          <div style={{ width: pct + "%", height: "100%", background: p.accent, transition: "width .35s var(--ttt-ease-out)" }} />
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "baseline", gap: 6, justifySelf: "end" }}>
        <span style={{ font: "700 30px var(--ttt-font-display)", color: lead ? p.accent : "var(--sx-ink)", fontVariantNumeric: "tabular-nums" }}>
          {fmtVal(metric, p.id)}
        </span>
        {metric.unit && <Cap color="var(--sx-ink-faint)" style={{ fontSize: 9 }}>{metric.unit}</Cap>}
      </div>
    </div>
  );
}

function App() {
  const [key, setKey] = React.useState("gols");
  const metric = METRICS.find((m) => m.key === key);
  const rows = rankFor(metric);
  const leader = rows[0];
  const max = Math.max(...PLAYERS.map((p) => metric.vals[p.id]));

  return (
    <div style={{ position: "relative", minHeight: "100%", background: "var(--sx-crt-900)",
      fontFamily: "var(--ttt-font-ui)", color: "var(--sx-ink)" }}>
      <Scanlines opacity={0.1} />
      <ProposalNav current="p1-leaderboard.html" />
      <div style={{ position: "relative", maxWidth: 1040, margin: "0 auto", padding: "32px 24px 48px" }}>
        <Wordmark />
        <div style={{ marginTop: 6 }}><Cap color="var(--sx-ink-faint)">{t(STR.p1Sub)}</Cap></div>

        {/* HERO — leader of the selected metric */}
        <div style={{ position: "relative", margin: "20px 0 28px", display: "grid",
          gridTemplateColumns: "minmax(0,1fr) auto", gap: 28, alignItems: "center",
          background: "var(--sx-crt-800)", border: `4px solid ${leader.p.accent}`,
          boxShadow: "var(--sx-num-shadow)", padding: "26px 30px", overflow: "hidden" }}>
          <Scanlines opacity={0.4} />
          <div style={{ position: "relative", display: "flex", flexDirection: "column", gap: 14 }}>
            <Cap color={leader.p.accent}>{metricLabel(metric)}{metric.better === "low" ? " · " + t(STR.lowerBetter) : ""}</Cap>
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <PlayerAvatar id={leader.p.id} size={88} />
              <div>
                <div style={{ font: "700 40px var(--ttt-font-display)", color: "var(--sx-ink)", lineHeight: 1 }}>{leader.p.name}</div>
                <div style={{ font: "var(--ttt-t-small)", color: "var(--sx-ink-dim)", marginTop: 6 }}>{leader.p.full} · {leader.p.years}</div>
              </div>
            </div>
            {metric.note && <div style={{ font: "var(--ttt-t-small)", color: "var(--sx-ink-faint)" }}>* {t(metric.note)}</div>}
          </div>
          <div style={{ position: "relative", textAlign: "center" }}>
            <BigNumber value={fmtVal(metric, leader.p.id)} size={150} color={leader.p.accent} />
            {metric.unit && <div style={{ font: "700 18px var(--ttt-font-display)", letterSpacing: "0.16em", color: "var(--sx-ink-dim)", marginTop: 4 }}>{metric.unit.toUpperCase()}</div>}
          </div>
        </div>

        {/* RANKING */}
        <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 28 }}>
          {rows.map((e, i) => <Row key={e.p.id} entry={e} rank={i + 1} metric={metric} max={max} />)}
        </div>

        {/* METRIC PICKER */}
        <div style={{ padding: "18px 18px 20px", background: "var(--sx-crt-800)", border: "2px solid var(--sx-crt-600)", marginBottom: 30 }}>
          <Cap style={{ display: "block", marginBottom: 12 }}>{t(STR.p1Switch)}</Cap>
          <MetricPicker metricKey={metric.key} setKey={setKey} />
        </div>

        <Credit />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
